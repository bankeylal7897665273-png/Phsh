<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapPrint - VIP Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="vip-box">
        <h2 id="form-title">Login</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <input type="password" id="re-password" placeholder="Re-enter Password" style="display:none;">
        
        <div class="loader" id="loader"></div>
        <button id="auth-btn">Login</button>
        <p style="margin-top: 15px; cursor: pointer; color: #b53cff;" id="toggle-form">Create Account</p>
    </div>

    <script type="module">
        import { auth, createUserWithEmailAndPassword, signInWithEmailAndPassword, db, ref, set } from './firebase-config.js';
        
        let isLogin = true;
        const toggleBtn = document.getElementById('toggle-form');
        const authBtn = document.getElementById('auth-btn');
        const loader = document.getElementById('loader');

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            document.getElementById('form-title').innerText = isLogin ? "Login" : "Create Account";
            document.getElementById('re-password').style.display = isLogin ? "none" : "block";
            authBtn.innerText = isLogin ? "Login" : "Create Account";
            toggleBtn.innerText = isLogin ? "Create Account" : "Login";
        });

        authBtn.addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            loader.style.display = "block";
            authBtn.style.display = "none";

            try {
                if(isLogin) {
                    await signInWithEmailAndPassword(auth, email, pass);
                    window.location.href = "home.html";
                } else {
                    const rePass = document.getElementById('re-password').value;
                    if(pass !== rePass) return alert("Passwords don't match!");
                    const userCred = await createUserWithEmailAndPassword(auth, email, pass);
                    // Free plan default (50 credits)
                    await set(ref(db, 'users/' + userCred.user.uid), {
                        email: email, plan: 'free', credits: 50
                    });
                    window.location.href = "home.html";
                }
            } catch (error) {
                alert(error.message);
                loader.style.display = "none";
                authBtn.style.display = "block";
            }
        });
    </script>
</body>
</html>
